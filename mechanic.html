<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dashboard Mécano</title>
 <link rel="stylesheet" href="./style.css">
</head>
<body class="mobile-app">
  <div class="mobile-shell">

    <header class="mobile-header">
      <div>
        <p class="app-kicker">Remorq QC</p>
        <h1 class="app-title">Dashboard mécano</h1>
      </div>
      <button class="logout-btn" onclick="logout()">Quitter</button>
    </header>

    <section class="profile-card">
      <div class="avatar-circle" id="userAvatar">M</div>
      <div class="profile-info">
        <p class="profile-label">Connecté</p>
        <h2 id="userName">Mécano</h2>
      </div>
    </section>

    <section class="main-counter-card">
      <p class="main-counter-label">Vélos validés aujourd’hui</p>
      <div class="main-counter-wrap">
        <div class="main-counter-number" id="validatedCount">0</div>
      </div>
    </section>

    <section class="stats-row">
      <div class="stat-card">
        <p class="stat-title">À contrôler</p>
        <div class="stat-value" id="pendingCount">0</div>
      </div>

      <div class="stat-card">
        <p class="stat-title">Retournés</p>
        <div class="stat-value" id="returnedCount">0</div>
      </div>
    </section>

    <section class="action-zone">
      <button class="primary-action" onclick="openScanner()">
        Scanner un vélo réparé
      </button>

      <button class="secondary-action" onclick="refreshDashboard()">
        Actualiser
      </button>
    </section>

    <section class="history-card">
      <div class="history-head">
        <h3>Derniers scans</h3>
      </div>

      <div id="recentList" class="history-list">
        <div class="empty-state">Aucun scan pour le moment</div>
      </div>
    </section>

  </div>

  <script src="js/mechanic.js"></script>
</body>
</html>
