<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Responsable</title>

<link rel="stylesheet" href="./style.css?v=40">

</head>

<body>

<div class="mobile-shell">

<header class="mobile-header">

<div>
<h1 class="app-title">Dashboard Responsable</h1>
<div class="app-version">App version 40</div>
</div>

<button class="logout-btn" onclick="logout()">Quitter</button>

</header>

<section class="profile-card">

<div class="avatar-circle" id="userAvatar">R</div>

<div>
<div id="userName">Responsable</div>
</div>

</section>


<section class="main-counter-card">

<div class="counter-nav">

<button class="counter-arrow" onclick="previousDay()">◀</button>

<div class="counter-center">

<div class="main-counter-label">Vélos à déployer aujourd'hui</div>

<div class="main-counter-number" id="validatedMainCount">0</div>

<div class="counter-date" id="dashboardDate">-</div>

</div>

<button class="counter-arrow" onclick="nextDay()">▶</button>

</div>

</section>


<section class="stats-row">

<div class="stat-card">
<div class="stat-title">HARD validés</div>
<div class="stat-value" id="hardCount">0</div>
<div class="stat-percent" id="hardPercent">0%</div>
</div>

<div class="stat-card">
<div class="stat-title">EASY/MEDIUM validés</div>
<div class="stat-value" id="easyCount">0</div>
<div class="stat-percent" id="easyPercent">0%</div>
</div>

</section>


<section class="stats-grid-2x2">

<div class="stat-card">
<div class="stat-title">À contrôler</div>
<div class="stat-value" id="pendingCount">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Contrôlés</div>
<div class="stat-value" id="controlledCount">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Retournés</div>
<div class="stat-value" id="returnedCount">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Mécanos actifs</div>
<div class="stat-value" id="mechanicsCount">0</div>
</div>

</section>


<button class="primary-action" onclick="openScanner()">
Scanner QC
</button>

<button class="secondary-action" onclick="refreshDashboard()">
Actualiser
</button>


<h3>Données par mécano</h3>

<div id="mechanicsList"></div>


</div>


<script src="./js/config.js?v=40"></script>
<script src="./js/manager.js?v=40"></script>

</body>
</html>
